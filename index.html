<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        /*CSS RESETS*/

body{
    background-color: #191919;
    line-height: 1.6;

}

h1 {
    margin-top: 0;
}


/*CSS START*/

.full-table {
    display: table;
    height: 100%;
    width: 100%;
}

.table-cell {
    display: table-cell;
    vertical-align: middle;
    text-align: center;
}

.card {
    padding: 10px 25px 10px 25px;
    border-radius: 10px;
    background: #2e7cd1;
    color: #fff;
    display: inline-block;
    box-shadow: 2px 2px 1px 0px #295C7B;
}

.card:hover {
    margin-top: 2px;
    box-shadow: none;
}

.clock {
    display: inline-block;
    font-family: 'Roboto', sans-serif;
    font-weight: bold;
    font-size: 1.2em;
    /* padding-left: 20px; */
}

.time {
    display: inline-block;
    min-width: 37px;
}

.colon {
    font-size: 1.1em;
    display: inline-block;
}

.date {
    display: block;
    min-width: 162px;
    /* padding-right: 30px; */
    /* border-right: 2px solid #295C7B; */
    font-family: 'Roboto', sans-serif;
    font-size: 1.2em;
}
.greet{
    
    min-width: 162px;
    /* padding-right: 30px; */
    font-family: 'Roboto', sans-serif;
    font-size: 1.2em;
}

    </style>
</head>
<body>
    <link href="https://fonts.googleapis.com/css?family=Lobster|Roboto:400,700" rel="stylesheet">

<div class="full-table">
  <div class="table-cell">
    
    <div class="card">
        <div class="greet" id="greet"></div>
      <div class="date" id="date"></div>
      <div class="clock">
        <div class="time" id="hour"></div>
        <div class="colon">:</div>
        <div class="time" id="min"></div>
        <div class="colon">:</div>
        <div class="time" id="sec"></div>
      </div>
    </div>
    
  </div>
</div>

<script>
    // 1. Get the parameters from the URL
    const urlParams = new URLSearchParams(window.location.search);
    
    // 2. Look for the "s" parameter (e.g., ?s=blue)
    const bgColor = urlParams.get('b');
    const colorInUrl = urlParams.get('c');
    
    // 3. If a color is found, apply it to the body background
    if (bgColor) {
        document.body.style.backgroundColor = bgColor;
    }
    // If the parameter exists, apply it to the .card element
    const urlParams = new URLSearchParams(window.location.search);

    if (colorInUrl) {
        const card = document.querySelector('.card');
        if (card) {
            // 1. Set the background immediately (Browser handles name or hex)
            card.style.backgroundColor = colorInUrl;
    
            // 2. Use a "ghost" element to convert names/hex to RGB for the shadow
            const temp = document.createElement("div");
            temp.style.color = colorInUrl;
            document.body.appendChild(temp);
            
            // Get the standard "rgb(r, g, b)" string from the browser
            const rgb = window.getComputedStyle(temp).color;
            document.body.removeChild(temp);
    
            // 3. Darken the RGB values for the box-shadow
            const rgbValues = rgb.match(/\d+/g).map(Number);
            const darken = (val) => Math.max(0, val - 40); // Subtract 40 for a darker shade
            const shadowColor = `rgb(${darken(rgbValues[0])}, ${darken(rgbValues[1])}, ${darken(rgbValues[2])})`;
    
            card.style.boxShadow = `2px 2px 1px 0px ${shadowColor}`;
        }
    }

    function date() {
var today = new Date();
 // 2026年3月5日 木曜日
document.getElementById('date').innerHTML = today.toLocaleString('ja-JP', {
  year: 'numeric',
  month: 'long',
  day: 'numeric',
  weekday: 'long'
});
}


function clock() {
var today = new Date();
var hour = zeros(twelveHour(today.getHours()));
var minutes = zeros(today.getMinutes());
var seconds = zeros(today.getSeconds());
if(today.getHours() >=12){
    seconds+=" PM"
}
else{
    seconds+=" AM"
}
hrs = today.getHours();
if (hrs < 12)
        greet = 'おはよう       ';
    else if (hrs >= 12 && hrs <= 17)
        greet = 'こんにちは     ';
    else if (hrs >= 17 && hrs <= 24)
        greet = 'こんばんは     ';
// console.log(today.toLocaleTimeString());
document.getElementById('greet').innerHTML = greet;
document.getElementById('hour').innerHTML = hour;
document.getElementById('min').innerHTML = minutes;
document.getElementById('sec').innerHTML = seconds;
}

function twelveHour(hour) {
if (hour > 12) {
    return hour -= 12 
} else if (hour === 0) {
    return hour = 12;
} else {
    return hour
}
}
// adds zero infront of single digit number
function zeros(num) {
if (num < 10) {
    num = '0' + num
};
return num;
}

function dateTime() {
date();
clock();
setTimeout(dateTime, 500);
}

dateTime()
// END
</script>

</body>
</html>
